<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>JobShaman</title>
    <meta name="description" content="Find your ideal job with AI analysis. JobShaman offers transparent listings with real salaries, benefits, and JHI scores. Filter by location, benefits, and companies.">
    <meta name="keywords" content="jobs, AI job analysis, JHI score, salaries, benefits, remote work, home office, job search, career growth">
    <meta name="author" content="JobShaman">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="language" content="en">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jobshaman.com/">
    <meta property="og:title" content="JobShaman - Smart job matching">
    <meta property="og:description" content="Find your ideal job with AI analysis. Transparent listings with real salaries, benefits, and unique JHI scores.">
    <meta property="og:image" content="https://jobshaman.com/og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="JobShaman">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://jobshaman.com/">
    <meta property="twitter:title" content="JobShaman - Smart job matching">
    <meta property="twitter:description" content="Find your ideal job with AI analysis. Transparent listings with real salaries, benefits, and unique JHI scores.">
    <meta property="twitter:image" content="https://jobshaman.com/og-image.jpg">
    <meta property="twitter:site" content="@jobshaman_cz">
    <meta property="twitter:creator" content="@jobshaman_cz">
    
    <!-- Additional SEO Meta Tags -->
    <meta name="theme-color" content="#0891b2">
    <meta name="msapplication-TileColor" content="#0891b2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JobShaman">

    <!-- Security: CSP tuned for external scripts/styles and assets -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      base-uri 'none';
      form-action 'self';
      script-src 'self' https://esm.sh;
      style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: https:;
      connect-src 'self' https://*.supabase.co https://api.jobshaman.cz https://jobshaman.cz https://jobshaman-search-api.northflank.app https://site--jobshaman--rb4dlj74d5kc.code.run https://nominatim.openstreetmap.org;
      worker-src 'self' blob:;
      manifest-src 'self';
    ">
    
    <!-- AEO (AI Engine Optimization) Meta Tags -->
    <meta name="description:extended" content="JobShaman is an intelligent job search platform. We provide transparent information about salaries, benefits, and work environment. Using AI, we analyze job listings and assign a unique JHI score (0-100), representing job happiness. All information in our system is verified and up to date.">
    <meta name="article:author" content="JobShaman Team">
    <meta name="article:section" content="Jobs, Career Development, AI Technology">
    <meta name="article:published_time" content="2024-01-01T00:00:00+00:00">
    <meta name="article:modified_time" content="2024-01-01T00:00:00+00:00">
    <meta name="article:tag" content="jobs, careers, AI, salary, benefits">
    
    <!-- Entity Optimization for AI Extraction -->
    <meta name="business_type" content="Job Search Platform">
    <meta name="primary_industry" content="Human Resources and Employment">
    <meta name="service_area" content="Global">
    <meta name="key_features" content="AI analysis, transparency, job happiness index, salary information, benefits calculation, culture insights">
    <meta name="unique_selling_proposition" content="Unique JHI score (Job Happiness Index) and full transparency of job listing information">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://jobshaman.com/">
    
    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://jobshaman.com">
    <link rel="preconnect" href="https://api.jobshaman.cz">
    
    <!-- Structured Data for AEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "JobShaman",
      "description": "Smart job matching with AI analysis, transparency, and JHI scores",
      "url": "https://jobshaman.com/",
      "inLanguage": "en-US",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://jobshaman.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- AEO for AI Search Engines -->
    <meta name="chatgpt-shareable" content="JobShaman is a job search platform with AI analysis of listings. It offers transparent information about salaries, benefits, and company culture.">
    <meta name="ai-summary" content="JobShaman helps candidates find the right job using AI analysis. It provides JHI scores, transparent salaries, benefits, and company insights.">
    <meta name="answer-type" content="job search platform">
    <meta name="audience" content="job seekers, career changers, professionals">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="backend-url" content="%VITE_BACKEND_URL%">
    <script src="/boot.js"></script>
    <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
