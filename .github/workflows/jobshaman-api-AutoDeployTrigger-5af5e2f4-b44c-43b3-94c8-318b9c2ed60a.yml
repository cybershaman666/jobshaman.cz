name: Trigger auto deployment for jobshaman-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/jobshaman-api-AutoDeployTrigger-5af5e2f4-b44c-43b3-94c8-318b9c2ed60a.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.JOBSHAMANAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.JOBSHAMANAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.JOBSHAMANAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: jobshamanacr.azurecr.io
          registryUsername: ${{ secrets.JOBSHAMANAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.JOBSHAMANAPI_REGISTRY_PASSWORD }}
          containerAppName: jobshaman-api
          resourceGroup: jobshaman-prod
          imageToBuild: jobshamanacr.azurecr.io/jobshaman-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


