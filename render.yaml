services:
  - type: web
    name: jobshaman-backend
    env: python
    healthCheckPath: /health
    buildCommand: pip install -r backend/requirements.txt
    startCommand: >
      sh -c 'cd backend && exec python -m gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:${PORT:-10000} --timeout 120'
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PREMIUM
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: STRIPE_PRICE_PROFESSIONAL
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_ENDPOINT
        value: https://api.mistral.ai/v1/chat/completions
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: AI_RESCUE_MODELS
        value: mistral-small-latest
      - key: RESEND_API_KEY
        sync: false
      - key: SCRAPER_TOKEN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: MONGODB_JOBSPY_COLLECTION
        sync: false
      - key: MONGODB_JOBSPY_ENRICHED_COLLECTION
        sync: false
      - key: MONGODB_JOBSPY_COMPANY_COLLECTION
        sync: false
      - key: MONGODB_JCFPM_COLLECTION
        sync: false
